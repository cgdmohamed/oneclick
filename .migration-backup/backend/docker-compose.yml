services:
  postgres:
    image: postgres:16-alpine
    container_name: hesabat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hesabat
      POSTGRES_PASSWORD: hesabat
      POSTGRES_DB: hesabat
    ports:
      - "5432:5432"
    volumes:
      - hesabat_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hesabat -d hesabat"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hesabat-pgadmin
    restart: unless-stopped
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@hesabat.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  hesabat_pg:
